id: brief-schema-tooling
type: brief
confidence: frontier
title: "Build kos validate + kos graph — schema validation and graph rendering"
content: |
  Second implementation probe. Two subcommands:

  `kos validate` — reads nodes/**/*.yaml, validates each against
  schema/node.schema.yaml. Checks: required fields present, confidence
  value valid, edge targets exist as node IDs, no orphan references,
  filename matches node ID, file lives in correct confidence directory.

  `kos graph` — reads all nodes, outputs dependency graph as mermaid
  (default) or dot (--format dot). Nodes colored by confidence tier.
  Edge labels show type and signal. Makes the graph VISIBLE for the
  first time — currently 25 nodes + 130 probe work products that
  nobody can see as a graph.

  ## Why these are one probe

  Both are read-only tools over the same YAML corpus. The validator
  ensures data quality; the renderer makes the shape visible. Building
  them together means the validator catches problems the renderer
  would hit, and the renderer visualizes what the validator checks.

  ## What we learn

  This probe tests whether schema v0.3 (three times revised, never
  tooled against) actually holds when code enforces it. Every node
  that fails validation is a finding about schema-implementation drift.
  The graph rendering will show whether the edge topology makes sense
  visually or whether there are structural problems invisible in YAML.

