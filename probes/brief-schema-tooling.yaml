brief:
  hypothesis: |
    Schema v0.3 is valid enough that > 90% of existing nodes pass
    validation without modification. The remaining failures are drift
    between the schema-as-documented and nodes-as-written — findings
    about whether the schema is actually followed in practice.

    The graph rendering will show a connected graph with clear
    confidence-tier clustering. If the graph is mostly disconnected
    (few edges between nodes), the edge model is underused. If the
    graph is a hairball, the edge model is too permissive.
  excluded_scope: |
    - Ripple / drift detection (separate probe)
    - Node creation or editing
    - Probe work product validation (probes/ directory has different
      formats than nodes/ — validate nodes first)
    - Finding validation (findings/ may not conform to schema either)
  success_signal: |
    1. `kos validate` runs on all 25 nodes and reports pass/fail per node
    2. > 90% of nodes pass without modification
    3. Failures are genuine drift, not schema bugs
    4. `kos graph` produces readable mermaid output for the 25-node graph
    5. The graph reveals at least one structural insight not visible from
       reading individual YAML files
  timebox: "Session-007 (one session)"
