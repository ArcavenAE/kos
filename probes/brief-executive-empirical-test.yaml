    The executive mechanism is general enough to produce correct
    behavior across three maximally different governance profiles.
    If convergence detection, the priority function, and the
    maturity model hold against independent project data, the
    mechanism is not overfitted to KOS.
  excluded_scope: |
    - The remaining 9 projects (tested after the three-project pass)
    - Implementation (still mechanism design, not code)
    - Calibrating exact threshold values (that requires more data)
