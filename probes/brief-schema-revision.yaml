    - finding-003-axiathon
brief:
  hypothesis: |
    The schema can be extended with (a) typed edges and (b) a temporal state
    field such that contradictions become structurally detectable without
    rejecting inconsistent input. The test: re-express a subset of the 43
    existing probe nodes using the revised schema and verify that seam
    inconsistencies are expressible as typed relationships rather than
    content-embedded descriptions.
  excluded_scope: |
    - Tooling to automate contradiction detection (that's a later probe)
    - Ripple engine design (depends on edge types but is a separate question)
    - Correspondence layer generalization (B4 scope expansion is noted but
      not addressed here)
    - Schema validation tooling (CLI, linting — comes after schema stabilizes)
  success_signal: |
    1. A revised schema that adds edge types and temporal state without
       breaking the existing 43 nodes (backward compatible or with a clear
       migration path)
    2. At least 3 of the existing seam-finding nodes (td-*, po-*, ax-*)
       can be re-expressed using typed edges instead of content-embedded
       contradiction descriptions
    3. The revised schema can express "this node contradicts that node"
       as a relationship, not as prose in a content field
    4. The temporal state extension doesn't collapse into confidence —
       the two axes remain independent

    If all four hold: confirms (promote schema toward bedrock).
    If edge types work but temporal state is unclear: partial.
    If the extension breaks the existing node set or adds complexity
    without detectable benefit: redirects.
  timebox: "Remainder of session-002"
