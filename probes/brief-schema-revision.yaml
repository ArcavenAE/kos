id: brief-schema-revision
type: brief
confidence: frontier
title: "Schema revision probe — edge types and temporal state"
content: |
  Combined probe addressing question-edge-types and question-temporal-state,
  informed by three-project data set (findings 001-003, 43 decomposed nodes).

  The schema (node.schema.yaml v0.1) was validated for basic decomposition but
  revealed two gaps:
  1. depends_on is the only relationship type. The graph can express derivation
     but not the nature of the relationship (implements, contradicts, supersedes).
     Without typed edges, contradictions must be encoded in content rather than
     structure — making them visible but not automatically detectable.
  2. Confidence (bedrock/frontier/graveyard) conflates epistemic state with
     temporal state. "Completed" is not bedrock (not a design principle), not
     frontier (not uncertain), not graveyard (didn't fail). The schema cannot
     represent lifecycle state.

  The tension identified by the user: the system must hold contradictions as
  first-class visible objects (because real documents ARE contradictory, and a
  graph that rejects them can't represent reality), while also making them
  structurally detectable (because silent contradictions are the problem we're
  solving). Contradictions should be nodes or typed edges, not errors.
depends_on:
  - question-edge-types
  - question-temporal-state
  - question-mvg-bootstrap
provenance:
  created_by: agent:claude@opus-4
  session: session-002
  created_at: 2026-03-15
  derived_from:
