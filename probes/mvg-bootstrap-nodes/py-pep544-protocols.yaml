id: py-pep544-protocols
type: element
confidence: frontier
title: "PEP 544: Protocols and structural subtyping for Python's type system"
content: |
  PEP 544 (Python 3.8, 2017) adds structural subtyping (static duck typing)
  to the type system that PEP 484 defined as purely nominal.
  Key claims:

  1. PEP 484 "only specifies the semantics of nominal subtyping."
     PEP 544 adds STRUCTURAL subtyping as a complement, not a replacement.

  2. Protocol classes are defined by inheriting from typing.Protocol.
     Classes that implement the required methods are implicit subtypes
     without needing to inherit from the protocol.

  3. Protocols use PEP 526 variable annotations for protocol member
     variables. Self-assigned attributes in methods are NOT protocol
     members — only class-body annotations count.

  4. Runtime isinstance() checks on protocols FAIL by default.
     The @runtime_checkable decorator must be explicitly applied.
     This contrasts with typing module ABCs (Iterable, Sized) which
     already support isinstance() structurally.

  5. Generic protocols support variance. Unlike nominal classes,
     de facto covariant protocols CANNOT be declared invariant — this
     would break transitivity of structural subtyping.

  6. Callback protocols with __call__ provide an escape hatch for
     callable signatures that Callable[...] from PEP 484 cannot express.

  7. Protocol classes "cannot extend a regular class" — only other
     protocols and Protocol itself.

  Source: pep-0544.rst (Status: Final)
