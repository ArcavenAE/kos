id: ax-http-timeout-conflict
type: element
confidence: frontier
title: "HTTP client timeout specified as both 60s and 30s in CLI/TUI architecture"
content: |
  The cli-tui-architecture.md states in two places:

  Under HTTP Client Architecture:
    "Timeout: 60s default, configurable"

  Under Communication Patterns:
    "Request timeout: 30 seconds default"

  Both are in the same document, describing the same HTTP client for the
  axiathon-client binary. This is a minor but clear Category 1 contradiction
  within a single document — it would cause different implementations depending
  on which section the implementer reads first.
