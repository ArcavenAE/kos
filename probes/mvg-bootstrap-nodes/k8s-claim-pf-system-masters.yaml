id: k8s-claim-pf-system-masters
type: element
confidence: frontier
title: "system:masters treated as exempt across KEPs 1040, 3221, and 4601"
content: |
  All three KEPs give system:masters special treatment, but through
  different mechanisms at different pipeline stages:

  KEP-1040 (P&F): system:masters requests match to an exempt priority level.
  They are never queued, never rejected, and don't consume concurrency
  allocation. This is enforced via FlowSchema matching on the groups attribute.
  There is a hardcoded backstop ensuring system:masters always gets exempt
  treatment even without explicit FlowSchema configuration.

  KEP-3221 (Structured AuthZ Config): system:masters bypass is handled by
  a superuser authorizer that runs BEFORE the configured authorization chain.
  The KEP explicitly states it is a non-goal to allow reordering this
  superuser authorizer. The authorization webhooks in the chain never see
  system:masters requests (they are already allowed).

  KEP-4601 (Selectors): States that "kube-apiserver may still authorize the
  request without considering the selectors (system:masters for instance)."
  The selector information is irrelevant for system:masters because they
  bypass authorization entirely.

  The three KEPs are consistent on this point: system:masters always bypasses
  all three subsystems. No contradiction detected.

  Sources: KEPs 1040, 3221, 4601
