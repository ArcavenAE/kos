id: bs-adr005-catalog-core-entities
type: element
confidence: frontier
title: "ADR005: Three core catalog entities (Component, API, Resource)"
content: |
  ADR005 defines three core entity kinds for the Backstage catalog:
  - Component: software (service, app, library, pipeline, etc.)
  - API: boundary between components (gRPC, Avro, code interfaces)
  - Resource: infrastructure (databases, queues, CDNs)

  States "we'll start by only implementing Component" with
  API and Resource to follow. All use apiVersion: backstage.io/v1alpha1.

  Notably, ADR005 says entities like API and Resource would be
  "indexed from existing definitions" and thus "wouldn't need their
  own descriptor files." This is an early-stage claim that has
  likely been superseded in practice.

  Source: docs/architecture-decisions/adr005-catalog-core-entities.md
