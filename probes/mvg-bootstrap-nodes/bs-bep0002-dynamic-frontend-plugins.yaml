id: bs-bep0002-dynamic-frontend-plugins
type: element
confidence: frontier
title: "BEP-0002: Dynamic frontend plugins via Module Federation"
content: |
  BEP-0002 (status: provisional) proposes runtime loading of frontend
  plugins without rebuilding the Backstage app. Key components:

  - Bundling: Webpack + Module Federation via @module-federation/enhanced
  - Distribution: static asset server on app-backend
  - Loading: Scalprum integration in createApp
  - Plugin registry: JSON manifest of available plugins and their manifests
  - Plugin manifest: name, version, loadScripts, buildHash, customProperties
  - Module sharing: singleton packages (react, react-dom, etc.) plus
    granular MUI component sharing for performance
  - New CLI command: `backstage-cli plugin export-dynamic`

  Only works with the "new frontend system" (declarative plugin integration).
  Does NOT support adding/removing plugins in a running app instance
  (requires page reload).

  Source: beps/0002-dynamic-frontend-plugins/README.md
