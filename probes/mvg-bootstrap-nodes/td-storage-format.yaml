id: td-storage-format
type: element
confidence: frontier
title: "ThreeDoors Phase 1 task storage format"
content: |
  CONTRADICTION: Two documents make incompatible claims about the same element.

  Source A (product-scope.md, line 8):
    "Local text file storage (~/.threedoors/tasks.txt)"

  Source B (high-level-architecture.md, line 33):
    "App reads ~/.threedoors/tasks.yaml (structured format with task metadata)"

  Source B (high-level-architecture.md, line 51):
    "Structured Data Format: YAML for human-readability and metadata support"

  These cannot both be true. The PRD specifies a plain text file; the architecture
  specifies structured YAML. This is not a naming difference — it implies different
  data models (line-per-task vs. structured records with metadata).

  The architecture's claim is internally consistent (YAML supports status, notes,
  timestamps). The PRD's claim contradicts the PRD's own Phase 1 scope which
  includes "task status management" and "mood tracking" — features that require
  structured storage, not plain text lines.

  Graph signal: the PRD's storage claim has no valid path to its own feature claims.
depends_on:
