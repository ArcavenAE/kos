title: "BMAD TEA seam: knowledge fragment count drifts across documents"
content: |
  The number of knowledge fragments is stated differently across documents,
  reflecting a growth from ~35 to 42 that was not propagated to all docs:

  - README.md: "40 reusable fragments" (line 75, workflow vs skills table)
  - CHANGELOG.md: "35 total" (at time of Playwright CLI addition)
  - MIGRATION.md: "35 knowledge fragments"
  - commands.md Session 7: "35 knowledge fragments exploration"
  - tutorials/learn-testing-tea-academy.md: "35 knowledge fragments" (2x)
  - troubleshooting.md: "42 fragments" (multiple times)
  - tea-overview.md: "42 fragments" (lines 458, 473)
  - Actual count: 42 files in knowledge/, 42 entries in tea-index.csv

  The true count is 42. Documents saying 35 or 40 are stale. This is a
  classic versioning-without-propagation problem: the knowledge base grew
  from 35 to 42 fragments (adding pactjs-utils, pact-mcp, pact-consumer-*,
  adr-quality-readiness-checklist, playwright-cli, pact-consumer-di), but
  only some docs were updated.

  Category: gap (stale reference, not contradiction in intent)
