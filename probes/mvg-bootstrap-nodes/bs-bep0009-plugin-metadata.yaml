id: bs-bep0009-plugin-metadata
type: element
confidence: frontier
title: "BEP-0009: Plugin metadata in package.json under backstage field"
content: |
  BEP-0009 (status: implemented) defines how plugin packages declare
  metadata:
  - All metadata in package.json under the "backstage" field
  - backstage.pluginId: identifier matching implementation
  - backstage.pluginPackages: array of related package names
  - backstage.role: package role (frontend-plugin, backend-plugin, etc.)
  - backstage.pluginPackage: for modules, the target plugin package

  Key rules:
  - pluginPackages generated by `backstage-cli repo fix`
  - pluginId inferred from package name if not present
  - Conflict resolution: union of pluginPackages, reject on mismatch
  - Required at publish time for plugin/module roles

  Source: beps/0009-plugin-metadata/README.md
