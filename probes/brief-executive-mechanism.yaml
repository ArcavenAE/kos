id: brief-executive-mechanism
type: brief
confidence: frontier
title: "Q3 probe: the executive mechanism — coordinating discovery and maintenance"
content: |
  Open question 3: What does the executive loop look like as software —
  scheduler, event system, agent orchestration — that coordinates probes
  (discovery) and ripple (maintenance)?

  Sharpened by session-003:
  - Finding-018: ripple is maintenance, not discovery. Ripple propagates
    staleness along existing edges. Probes discover new edges and signal.
    The executive must coordinate both.
  - Finding-018 bridge insight: convergent dirty flags from ripple should
    trigger new probes. This is the escalation path from maintenance to
    discovery.
  - Finding-019: the human sees undeclared structure. The executive must
    include a human-in-the-loop mechanism for pattern recognition that
    agents cannot perform.
  - B2: the process cycle (orient-question-probe-harvest-promote) is the
    unit of discovery. The executive runs this cycle.
  - B6: cognitive architecture — graph is memory, inference is working
    memory, ripple is attention, executive is "the cycle running between
    graph and inference."

  ## Approach

  This is a DESIGN probe. Propose an executive mechanism, then test it
  against existing findings and the ripple engine design (finding-018)
  to check whether it coordinates correctly.

  Three design sub-questions:

  1. SCHEDULING: What triggers a probe cycle? What triggers a ripple
     pass? How are they interleaved? The naive answer is "human decides"
     — but the bridge insight says ripple can escalate to probes
     automatically. What does that look like?

  2. ATTENTION ALLOCATION: Given a graph with N dirty nodes and M open
     questions, what gets worked on next? The executive must allocate
     agent attention. This is the prioritization problem. It must handle:
     - Dirty nodes from ripple (maintenance backlog)
     - Open questions from probes (discovery frontier)
     - Convergent dirty flags (ripple-to-probe escalation)
     - Human-identified patterns (finding-019 — undeclared structure)

  3. COHERENCE OVER TIME: How does the executive maintain purpose across
     sessions? The charter is the current answer (finding-015 validated
     cold-start from repo). But as the graph grows, the charter will
     compress lossy (F5 remaining question). What is the executive's
     continuity mechanism at scale?

  For each sub-question, propose a mechanism and test it against the
  existing probe data (three sessions, 19 findings) to check whether
  the proposed mechanism would have produced the same sequence of work.

  ## Design constraints (from existing bedrock and findings)

  - The cycle is the unit, not the sprint or the phase (B2)
  - History is the primary record; current state is a view (B3)
  - Human provides continuity, direction, judgment, graveyard
    maintenance (collaboration model)
  - Agent provides inference, synthesis, reasoning within sessions
  - Ripple is dirty-flag propagation with typed attenuation (finding-018)
  - Probes are timeboxed (B2)
  - Pattern recognition on undeclared structure requires the human
    (finding-019) — the executive cannot fully automate
  - The process quality gradient (B7) means the executive should
    target effort where governance is weakest

