brief:
  hypothesis: |
    The executive is an event-driven loop with three input channels
    (ripple flags, open questions, human pattern recognition) and one
    output (the next probe cycle to run). It does not need a scheduler
    in the traditional sense — it needs a priority function over the
    three channels and a mechanism for the human to override it.

    The key mechanism: ripple convergence (multiple independent dirty
    paths converging on the same region of the graph) is a signal that
    maintenance has found something probes should investigate. This is
    the automatic escalation from maintenance to discovery.

    Human-in-the-loop is not a gate — it is an input channel with
    higher authority than the other two. The human can inject questions,
    redirect attention, and see patterns the graph cannot represent.
  excluded_scope: |
    - Implementation (no code, just mechanism design)
    - UI/notification design (how the human sees the priority queue)
    - Multi-agent orchestration (how multiple agents coordinate — too
      early without a single-agent executive working first)
    - Tooling for the executive (IDE integration, CLI, etc.)
  success_signal: |
    1. A proposed mechanism with clear trigger/response rules for all
       three input channels
    2. Retrospective test: the mechanism would have produced a similar
       work sequence to what sessions 001-003 actually did (the human
       would have been offered similar probes in similar order)
    3. The ripple-to-probe escalation path is specified with concrete
       trigger conditions (not just "convergent dirty flags" — what
       threshold, what topology?)
    4. The human-in-the-loop mechanism preserves finding-019's insight
       (human sees undeclared structure) without making the human a
       bottleneck

    If all four: confirms (executive design is viable).
    If 1-2 only: partial (mechanism works, escalation needs more work).
    If the retrospective test shows the mechanism would have produced
    a very different sequence: redirects (the priority function is
    wrong or the input channels are wrong).
  timebox: "Session-004, first probe cycle"
