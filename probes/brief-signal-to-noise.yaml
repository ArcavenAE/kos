brief:
  hypothesis: |
    At least half the issues the graph finds at document seams have
    real consequences (bugs, confusion, wasted effort, or delayed
    discovery of problems). The other half are noise — true but
    practically irrelevant. The graph's value is in the consequential
    half, and the noise is manageable if it can be filtered by the
    executive mechanism's priority function.

    If the consequential fraction is below 30%, the graph is too
    noisy to be useful without significant filtering. If above 70%,
    the graph is remarkably precise and the noise concern is
    overstated.
  excluded_scope: |
    - Redundancy angle (separate probe — do code and docs produce
      the same signal?)
    - Fixing the issues found (this probe detects, doesn't repair)
    - Tooling for noise filtering (executive mechanism handles this)
  success_signal: |
    1. For ThreeDoors: human ground truth on all 10 issues — which
       mattered, which didn't, which caused real problems
    2. For OpenClaw: at least 3 issues found, cross-referenced against
       GitHub issues for independent discovery
    3. For Atmos: at least 3 issues found, cross-referenced against
       ADRs and issue tracker
    4. A signal-to-noise ratio calculated across all three projects
    5. At least one issue the graph missed that the project's own
       community found (the MISSING category)

    If ratio ≥ 50% consequential: confirms (signal is worth finding).
    If 30-50%: partial (signal exists but noise is a real problem).
    If < 30%: disconfirms (graph generates more noise than signal).
  timebox: "Session-004, third probe cycle"
