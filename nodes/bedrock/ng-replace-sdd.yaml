id: ng-replace-sdd
type: non-goal
confidence: bedrock
title: "Do not replace existing SDD processes"
content: |
  KOS runs alongside existing SDD systems. It does not require teams to
  change their tools or workflows. Existing documents (PRDs, ADRs,
  architecture docs) are ingested as low-confidence inferred nodes —
  valid but lossy projections of the graph.

  The transition from shadow to graph as source of truth happens gradually,
  not by flag day. This is a strategic non-goal: replacing existing processes
  creates adoption friction that would kill the project before it demonstrates value.
