id: question-temporal-state
type: question
confidence: frontier
title: "How should the schema handle temporal status vs. epistemic confidence?"
content: |
  The MVG bootstrap probe (finding-001) revealed that the confidence
  classification (bedrock/frontier/graveyard) conflates two distinct
  concepts:

  1. Epistemic confidence: how certain are we that this is true?
     (bedrock = high certainty, frontier = uncertain, graveyard = ruled out)

  2. Temporal status: what lifecycle state is this in?
     (planned, in-progress, completed, validated, superseded)

  ThreeDoors Phase 1 is both BEDROCK (proven, validated) and COMPLETED
  (no longer in scope for current work). The schema can't say both.

  The graveyard conflates "tried and ruled out" (epistemic) with
  "no longer active" (temporal). A completed feature is not graveyarded —
  it succeeded. But the schema has no state for "succeeded and done."

  This matters because temporal drift (Phase 1 still marked "In Scope"
  when it's complete) was one of the inconsistencies the probe found.
  If the schema can't represent temporal state, the graph can't detect
  temporal drift.

  PROBED in session-002. See finding-004-schema-revision.
  Result: DEFERRED. Temporal state does not need its own schema field.
  External temporal inconsistencies are expressible as contradicts edges.
  Internal KOS lifecycle is derived from graph topology (question with
  finding = answered, promoted node = bedrock). Reopener: a temporal
  distinction that is not expressible as contradiction AND not derivable
  from graph topology AND matters for automation.
