finding:
  probe: brief-mvg-bootstrap
  result: partial
  details: |
    The seam test partially confirms the checksum property on a qualitatively
    different document type: sequential design RFCs rather than parallel
    planning artifacts.

    Result is PARTIAL (not confirms) because RFCs are inherently sequential
    — later ones are expected to supersede earlier ones. The "contradictions"
    found are mostly expected evolution, not bugs. The checksum property still
    reveals useful information: specifically, that the RFC system lacks formal
    supersession tracking, and that even the "stabilization RFC" (2592) shows
    API signatures that differ from what was actually stabilized.

    The strongest signal: PinBox<T> was proposed with full API surface in
    RFC 2349 and then silently dropped with no RFC-level record. The
    graveyard entry exists only in a blog post outside the RFC system.
    This is the exact pattern KOS is designed to catch — understanding
    that was accumulated (the PinBox design, its evaluation, and its
    rejection) lives outside the formal artifact chain.

    The weakest signal: most "contradictions" are just time passing.
    The RFC process is designed for immutable snapshots, and evolution
    is expected. Flagging these as contradictions overstates the problem.
    The checksum property is more diagnostic on parallel documents
    (like the Axiathon planning set) than on sequential ones (like RFCs).
