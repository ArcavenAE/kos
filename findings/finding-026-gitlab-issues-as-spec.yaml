title: "GitLab issues-as-spec: enforcement gaps and authority fragmentation are new signal classes"
content: |
  ## Summary

  Probed GitLab (gitlab-org/gitlab, 30M+ lines) using the issues
  board as specification instead of traditional docs. Cross-referenced
  process documentation (docs.gitlab.com), handbook (handbook.gitlab.com),
  and repo templates (.gitlab/).

  6 issues found. 2 HIGH severity (1 structural), 2 MEDIUM, 2 LOW.
  9 community-filed issues matching the same problem classes.
  Highest signal-to-noise ratio in the four-project sample: 67%
  consequential, 33% noticed/low, 0% noise.

  Most consequential: Definition of Done lists ~25 requirements,
  MR template covers ~8. 9 community issues about this gap.
  Issue #31603 requests adding DoD to template — known, unresolved.

  New signal classes:
  - ENFORCEMENT GAP: spec says requirement exists, implementation
    doesn't enforce it, permission system prevents actors from
    complying. Three-way gap invisible in any single document.
  - AUTHORITY SURFACE FRAGMENTATION: three authoritative sources
    (docs site, handbook, repo templates) with no declared
    precedence hierarchy across surfaces.
  - PERMISSION ASYMMETRY: triage docs say apply labels, community
    contributors cannot apply labels. Process assumes permissions
    that actors don't have.

  The issues-as-spec approach revealed signal that traditional doc
  probing misses: enforcement gaps and permission asymmetries require
  understanding who can act, not just what is written. Automation
  (triage-ops bot) serves as a shadow specification invisible to
  document-level analysis.

  See finding-023-signal-to-noise-four-projects for full signal-to-
  noise classification.

