glob_matcher: doublestar

# Pre-commit: fast feedback only. Full suite is `just ci`.
# Rationale: clippy + test both compile the full project. Running both
# in parallel means two concurrent compiles fighting over target/.
# Keep fmt (instant) + clippy (compiles + lints in one pass). Run tests
# via `just ci` before pushing, not on every commit.
pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "**/*.rs"
      run: export PATH="$HOME/.cargo/bin:$PATH"; cargo +nightly fmt --all -- --check

    clippy:
      glob: "**/*.rs"
      run: test -f "$HOME/.cargo/env" && . "$HOME/.cargo/env"; cargo clippy --all-targets --all-features -- -D warnings
