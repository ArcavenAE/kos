title: "OpenClaw seam test: 7 issues, Node version divergence and sandbox default contradiction most consequential"
content: |
  ## Summary

  Probed OpenClaw (316k stars, local-first AI assistant, 19k commits)
  across README, SECURITY.md, VISION.md, AGENTS.md, CONTRIBUTING.md,
  THREAT-MODEL-ATLAS.md, package.json, and docs/concepts/.

  7 issues found. 2 HIGH severity, 3 MEDIUM, 2 LOW.

  Most consequential: Node.js version (4 docs give 4 different
  minimums, package.json disagrees with all human-readable docs)
  and sandbox default (threat model recommends sandbox, actual
  default is sandbox OFF, SECURITY.md describes it contradictorily).

  New signal class: ANALYSIS-VS-OPERATIONS DIVERGENCE. Threat model
  rates prompt injection as Critical. Security policy says prompt
  injection reports are out of scope. Both correct in isolation.

  2 of 3 consequential issues independently discovered by community
  via GitHub issues (#23314, #4940).

  See finding-023-signal-to-noise-four-projects for full signal-to-
  noise classification.

