finding:
  probe: brief-mvg-bootstrap
  result: partial
  details: |
    The checksum property is confirmed: the graph surfaces inter-document
    inconsistencies that are invisible in individual documents. However,
    the result is PARTIAL, not CONFIRMS, because:

    1. The schema needs edge types beyond depends_on to fully express
       relationships (implements, contradicts, supersedes)
    2. Temporal state (completed, validated) is not captured by the
       confidence classification
    3. Category 1 contradictions are structurally forced to surface
       (you can't build a clean graph), but Category 2 gaps require
       actively looking for missing edges — they're visible but not
       automatic

    The partial result spawns new questions:
    - question-edge-types: What relationship types beyond depends_on
      does the schema need?
    - question-temporal-state: How should the schema handle temporal
      status (done, validated, superseded) vs. epistemic confidence?
    - question-automated-detection: Can gap detection (Category 2) be
      made automatic through schema constraints rather than manual
      inspection?
