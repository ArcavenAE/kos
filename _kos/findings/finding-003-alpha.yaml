finding:
  probe: brief-mvg-bootstrap
  result: confirms
  details: |
    The seam test confirms the checksum property on a real, production-scale
    planning document set. The Project Alpha docs are individually well-written
    and the architecture validation marks everything resolved — but the
    graph-based decomposition found 6 contradictions, 2 gaps, and a
    systematic pattern of phase boundary erosion that the project's own
    validation process did not detect.

    The strongest signal: the self-assessment documents (architecture-gaps.md,
    architecture-validation-results.md) check coverage but not consistency.
    They confirm every FR has an architecture home, but never ask whether
    the homes agree with each other or with the PRD that generated them.
    The graph catches what the checklist misses.

    Result is CONFIRMS (not partial) because the probe question was whether
    the graph reveals inter-document inconsistencies that reading individual
    documents hides. It does, clearly and repeatedly, across a document set
    that already underwent its own internal validation pass.
