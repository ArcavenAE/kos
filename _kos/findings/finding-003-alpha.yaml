id: finding-003-alpha
type: finding
confidence: frontier
title: "Project Alpha seam test: PRD-to-architecture graph reveals systematic phase boundary erosion and internal contradictions"
content: |
  ## Summary

  We decomposed the Project Alpha PRD (executive-summary, product-scope, functional-requirements)
  and architecture (project-structure-boundaries, data-architecture, multi-tenant-architecture,
  cli-tui-architecture, detection-engine, architecture-gaps, validation-results) into 14 typed
  KOS nodes with declared dependencies. The decomposition surfaced 10 inconsistencies across
  the document set.

  The architecture's own validation (architecture-gaps.md, architecture-validation-results.md)
  declares all gaps resolved and the system ready for implementation. This probe found
  inconsistencies that the validation missed because it checked coverage (does every FR have
  an architecture document?) rather than consistency (do the documents agree with each other?).

  ## Category 1: Contradictions

  These are cases where two documents claim different things about the same concept.

  **1. query DSL parser technology (ax-detection-dsl-parser)**
  CLAUDE.md says "custom PEG grammar (parser-A)." Architecture says "parser-B."
  These are different parsing frameworks. An AI agent following CLAUDE.md would implement
  the wrong parser.

  **2. Query latency targets (ax-query-latency-claims)**
  Executive summary: "sub-100ms query latency" (unqualified).
  FR44: "sub-100ms p99 latency."
  Architecture: "<100ms p95" for hot tier only; 24h data is "<500ms p95."
  The PRD promises p99 sub-100ms; the architecture can only deliver p95 sub-100ms
  on the hottest data tier.

  **3. data catalog implementation (ax-data-catalog-catalog-conflict)**
  Same architecture document says both "SQLite catalog (validated in spike)" and
  "PostgreSQL 16 — data catalog" in the infrastructure table. Two different
  catalog backends for the same system.

  **4. Real-time communication protocol (ax-realtime-comms-conflict)**
  Data architecture says "SSE push" for TUI real-time updates.
  CLI/TUI architecture says "WebSocket connection to server."
  Project structure boundaries says "HTTP/JSON+SSE."
  Three documents, two protocols.

  **5. HTTP client timeout (ax-http-timeout-conflict)**
  CLI/TUI architecture specifies both "60s default" and "30 seconds default"
  in different sections of the same document.

  **6. RBAC phase assignment (ax-rbac-phase-conflict)**
  Product scope: RBAC is Phase 2 (Growth).
  Functional requirements: FR72-84 define RBAC roles with no phase annotation.
  Architecture: treats RBAC as part of the authentication system (MVP).
  Multi-tenant MVP requires role differentiation (operations role) but the
  PRD says roles are Growth.

  ## Category 2: Gaps

  These are cases where information exists in one document but is missing from
  another where it should appear.

  **7. Infrastructure dependencies invisible in PRD (ax-infra-services-undeclared)**
  The architecture requires PostgreSQL 16, Redis 7, embedded-kv, and object-store.
  The PRD promises installation via "cargo install" and "one-liner script."
  The PRD was never updated to reflect the operational complexity of the
  architecture's infrastructure requirements.

  **8. Crate naming drift (ax-crate-naming-drift)**
  Starter template evaluation says alpha-api and alpha-tui.
  Project structure boundaries says alpha-server and alpha-client.
  The actual codebase matches the latter. The earlier document was superseded
  but never updated.

  ## Category 3: Structural chaos — phase boundary erosion

  This is the most significant finding and the one that only becomes visible
  when the graph connects all the documents together.

  **9. Systematic MVP scope inflation (ax-mvp-scope-inflation)**
  The product-scope.md defines a focused MVP. The functional requirements and
  architecture progressively expand it:
    - context engine (business hours, holidays, maintenance windows,
      cron schedules) — labeled MVP in FRs, not in product-scope
    - correlation engine (multi-stage DAG, embedded-kv persistence, risk
      scoring, campaign grouping) — labeled MVP in FRs, product-scope puts
      "advanced correlation" in Growth
    - plugin system (WASM plugins, SDK) — labeled MVP
      in FRs, not mentioned in product-scope at all
    - schema normalization pipeline — implied by architecture, not scoped in PRD

  **10. Cross-phase dependencies (ax-dissector-plugin-phase-conflict)**
  The plugin system is labeled MVP but depends on the asset graph
  (Growth) and session query DSL (Growth). Implementing the full plugin
  system at MVP requires pulling Growth features forward.

  **11. TUI phase bleed (ax-tui-phase-conflict)**
  TUI is explicitly Growth in product-scope. But FR33 (query via TUI) has no
  phase annotation and sits alongside MVP requirements. The binary architecture
  (alpha-client) packages CLI and TUI in the same crate, creating a structural
  coupling between MVP and Growth scope.

  The pattern across items 9-11: each document is internally consistent about
  phases, but the boundaries erode as you move from PRD to FRs to architecture.
  Product-scope defines the perimeter. Functional requirements expand it by
  adding "MVP" labels to features not in product-scope. Architecture accepts
  the expanded scope without checking back against the original perimeter.
  The validation documents check architecture-internal consistency but never
  validate against the original PRD scope.

  ## What the graph revealed that single-document reading hides

  No single document has an error you'd catch by reading it carefully. The
  executive summary is compelling. The product scope is well-organized. The
  functional requirements are thorough. The architecture is detailed. The
  validation confirms coverage.

  The problems exist exclusively at the seams:
  - PRD says X is Growth; FRs say X is MVP; architecture builds X as MVP
  - PRD promises simplicity; architecture requires 4 infrastructure services
  - CLAUDE.md says parser-A; architecture says parser-B
  - One architecture doc says SSE; another says WebSocket
  - Validation checks coverage but not cross-document consistency

  The graph made these visible because building dependency edges between
  nodes FORCES you to ask: does the upstream node agree with the downstream
  node? When it doesn't, the edge can't be drawn cleanly.

  ## Meta-observation

  The architecture-gaps.md and architecture-validation-results.md represent
  a self-assessment. They confirm that the architecture covers all FRs. But
  they don't check whether the FRs are consistent with the PRD, or whether
  the architecture's technology choices match the project's CLAUDE.md. The
  validation is vertical (does each FR have a home?) rather than horizontal
  (do the documents agree at the seams?). This is exactly the kind of check
  that the graph-based seam test provides.
