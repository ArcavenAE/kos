brief:
  hypothesis: |
    The _kos/ directory convention with kos.yaml manifests is sufficient to
    support distributed knowledge graphs across a multi-repo orchestrator.
    Graph discovery via manifest includes works without requiring a central
    index beyond the orchestrator's kos.yaml. The init command produces
    graphs that pass doctor checks. The templates are sufficient for cold-start
    adoption of the kos process.
  excluded_scope: |
    - Migrating aae-orc charter items to nodes (separate session, Part A)
    - Moving kos's own graph to _kos/ (separate session, B6)
    - Subrepo opt-in (ongoing, per-repo)
    - kos bridge (separate probe, session-008+)
    - kos drift / ripple (separate probe, session-009)
  success_signal: |
    1. `kos init` creates _kos/ with valid kos.yaml, charter template, CLAUDE.md
       session protocol, and commit rules
    2. `kos init --update` is idempotent — running twice changes nothing
    3. `kos doctor` reports clean on a freshly initialized graph
    4. `kos doctor` catches real problems (missing dirs, broken edges, stale charter)
    5. `kos graphs` lists discovered graphs with node counts
    6. Backward compatibility: existing kos commands work with legacy nodes/ layout
  timebox: "Session-008 (one session)"
