title: "Broadening probe — test category stability across 9 external projects"
content: |
  Written retroactively. This brief was skipped during execution —
  the probe was launched directly from conversation without writing
  an exploration brief first. This is itself a harvest gap that
  motivated the addition of harvest verification to the session
  protocol. See CLAUDE.md.

  The probe extended the MVG bootstrap test (findings 001-003) from
  three personal projects to twelve total by adding nine external
  open-source projects with diverse governance models, scales, and
  document types.
