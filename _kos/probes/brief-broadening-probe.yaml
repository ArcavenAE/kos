brief:
  hypothesis: |
    The three categories identified in findings 001-003 (contradictions,
    gaps, structural chaos) are stable across projects with different
    governance models, scales, and document types. If the categories
    are artifacts of BMAD-shaped solo projects, they will not appear
    in projects with RFC/KEP/PEP processes and larger teams.
  excluded_scope: |
    - Schema changes (handled by brief-schema-revision)
    - Tooling or automation
    - Spec-to-code correspondence testing
  success_signal: |
    - Categories appear in external projects: confirms stability
    - Categories don't appear: suggests they're BMAD-specific
    - New categories emerge: expands the model
    All three outcomes are informative. The goal is data, not confirmation.
  timebox: "session-002 (executed in parallel across 9 agents)"
