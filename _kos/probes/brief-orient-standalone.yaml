id: brief-orient-standalone
type: brief
confidence: frontier
title: "Standalone orient probe — gathering layer for repos outside aae-orc"
content: |
  Implement orient for standalone repos (not under an aae-orc orchestrator)
  and test whether a structured gathering layer produces better orientation
  than the current string-matching filter.

  This is simultaneously:
  - A practical fix (orient doesn't work from ~/work/ftc)
  - A test of the gathering-vs-interpreting hypothesis
  - The first step toward kos being usable outside its own directory

  ## Approach

  1. Add Workspace::is_standalone() detection
  2. Build gather_standalone() that reads the local _kos/ graph without
     target-name filtering — all nodes, findings, probes, ideas, charter
     items are relevant in a standalone repo
  3. Refactor existing loaders to accept Option<&str> target (None = no
     filter for standalone, Some = filter for orchestrator)
  4. Output both human-readable and JSONL (--json)
  5. Test from ftc (standalone) and switchboard (subrepo) to verify no
     regression

  The probe tests the gathering-vs-interpreting question by comparing:
  - kos orient (human output) from ftc — what does the CLI show?
  - kos orient --json from ftc piped into an LLM session — what does
    the LLM synthesize from the same structured data?
  - Manual orientation (LLM reads charter + graph directly) — baseline

  ## Implementation details

  Paths that need fixing for standalone _kos/ layout:
  - Charter: workspace.root.join("charter.md") — correct path but must
    show ALL items, not filter by target name
  - Findings: must use _kos/findings/ not legacy kos_root/findings/
  - Nodes: must use _kos/nodes/{bedrock,frontier,graveyard}/ not legacy
  - Probes: _kos/probes/ (not shown in current orient at all)
  - Ideas: _kos/ideas/ (not shown in current orient at all)

  Orchestrator path (gather) is untouched — branching at run() level.

depends_on:
  - question-orient-gathering-vs-interpreting
