provenance:
  created_by: human
  session: session-013
  created_at: "2026-04-05"
brief:
  hypothesis: |
    A standalone-aware gathering layer that outputs complete, unfiltered
    graph data will:
    (a) Fix the immediate problem (orient works from ftc)
    (b) Produce richer orientation when consumed by an LLM than the
        current string-matching filter produces for humans
    (c) Not regress the orchestrator/subrepo use cases

    If (a) and (c) but not (b): the fix is still valuable, but the
    gathering-vs-interpreting split is not proven. The human output
    may be sufficient.

    If (a), (b), and (c): confirms that orient should evolve toward
    structured gathering with LLM interpretation on top. The human
    output becomes a convenience, not the primary interface.

    If (a) fails: the standalone workspace model needs deeper work
    than a codepath branch.
  excluded_scope: |
    - Process subcommands (kos idea, kos question, etc.) — separate work
    - Built-in docs / help system — separate work
    - Universal bridge framework — separate work
    - Changes to the kos README
    - Automated LLM integration (the LLM test is manual: pipe --json
      output into a session and compare)
  success_signal: |
    Functional acceptance tests — run from standalone repo (~/work/ftc)
    and orchestrator subrepo (aae-orc/switchboard):

    FAT-1: Standalone discovery
      cd ~/work/ftc && kos orient
      Expected: header shows standalone indicator (e.g. "(standalone)").
      Does NOT show "(no items found)" or suggest aae-orc targets.

    FAT-2: Charter items shown unfiltered
      cd ~/work/ftc && kos orient
      Expected: ALL Bedrock/Frontier/Graveyard items from ftc/charter.md
      listed. Not filtered by target name.

    FAT-3: Nodes by confidence tier
      cd ~/work/ftc && kos orient  (after adding nodes to _kos/nodes/)
      Expected: bedrock, frontier, graveyard nodes listed by tier with
      id and title. Empty tiers omitted or shown as empty.

    FAT-4: Findings, probes, ideas displayed
      cd ~/work/ftc && kos orient  (after adding to _kos/)
      Expected: findings from _kos/findings/, probes from _kos/probes/,
      ideas from _kos/ideas/ all appear.

    FAT-5: Empty graph gives useful hint
      cd ~/work/ftc && kos orient  (freshly initialized, no nodes)
      Expected: charter items if charter exists. For empty sections,
      hint says "add nodes to _kos/nodes/" — NOT "Try: kos orient kos".

    FAT-6: Orchestrator subrepo unchanged
      cd ~/work/aae-orc/switchboard && kos orient
      Expected: same output as before — charter items filtered by
      "switchboard", aae-orc RD briefs, findings. No regression.

    FAT-7: kos repo itself unchanged
      cd ~/work/aae-orc/kos && kos orient kos
      Expected: same output as before. No regression.

    FAT-8: JSONL includes standalone fields
      cd ~/work/ftc && kos orient --json
      Expected: JSONL includes node entries with confidence, probe
      entries, idea entries. Machine-consumable.

    Gathering-vs-interpreting comparison (manual, not automated):
    FAT-9: Feed kos orient --json output into a Claude session.
      Ask the LLM to orient on the project using only that data.
      Compare quality against FAT-2 human output and against manual
      orientation (LLM reads charter directly). Record which produced
      better orientation and why.
  timebox: "Session-013 (this session for implementation, testing may span)"
