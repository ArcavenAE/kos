provenance:
  created_by: human
  session: session-005
  created_at: 2026-03-30
brief:
  hypothesis: |
    The RD briefs are consistent enough that > 70% of findings can be
    extracted programmatically (regex + markdown parsing, no LLM needed).
    The remaining 30% may need manual tagging or format standardization.

    If extraction works: confirms that the RD-to-kos bridge is viable
    with simple tooling.
    If extraction fails (< 50% parseable): redirects — the RD brief
    format needs a schema before the bridge can work.
  excluded_scope: |
    - Full kos node generation (typed edges, correspondence links)
    - Automated confidence classification (human judgment required)
    - ThreeDoors retrospector integration (different project, different format)
    - Any LLM-based extraction (keep it simple, test the simple approach)
  success_signal: |
    1. Tool reads all 4 RD briefs and extracts a structured index
    2. > 70% of numbered findings (F-01 through F-10, F1 through F38)
       appear in the output with id, title, confidence, source_repo
    3. `kos orient marvel` uses the index to surface marvel-relevant
       findings that don't exist in kos's own findings/
    4. The unified index is < 1 file, queryable with grep/jq
  timebox: "Session-008 (one session)"
