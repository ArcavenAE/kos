id: brief-rd-bridge
type: brief
confidence: frontier
title: "Build kos bridge — extract RD findings into queryable kos format"
content: |
  Third implementation probe. Reads sprint/rd/*.md briefs from the
  aae-orc orchestrator and extracts findings into structured YAML or
  JSONL that kos tooling can query.

  ADR-006 says RD briefs are "proto-kos artifacts" — same structure,
  less ceremony. This tool makes the connection mechanical: it reads
  the lighter-form findings (F-01 through F-10 in marvel-mvp-probe.md,
  F1 through F38 in forestage-distribution.md) and produces structured
  records with: id, title, confidence, source_brief, source_repo,
  date, and content.

  This is NOT a format converter. It doesn't produce full kos nodes
  with typed edges. It produces a queryable index of what was learned
  across the ecosystem — the minimum needed for `kos orient` to
  surface RD findings by repo.

  ## What we learn

  Whether the RD brief format is consistent enough to parse reliably.
  The briefs were written by agents in conversation, not against a
  schema. If they're too inconsistent, that's a finding about whether
  ADR-006's "lighter form" needs more structure.

  Also tests whether 48 RD findings + 28 kos findings compose into
  a useful unified index, or whether the two corpora are too different
  in shape to merge.

