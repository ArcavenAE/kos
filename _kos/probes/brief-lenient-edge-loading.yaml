id: brief-lenient-edge-loading
type: brief
confidence: frontier
title: "Lenient edge loading — nodes never dropped, validate gates"
content: |
  ## Question

  Addresses question-edge-vocabulary-gap sub-question (c): the loader
  currently drops an ENTIRE node when one edge carries an unknown
  type — serde parses Edge.edge_type as a strict enum (model.rs:131),
  the whole-document parse fails, and the load loop (copy-pasted 9x
  across orient/drift/graph/charter/compact/...) eprintln-warns to
  stderr and skips the file. Observed cost: marvel ran two months
  with 14/25 nodes invisible to orient; switchboard is 11/13
  invisible today; ~49 nodes hidden fleet-wide. Nobody noticed
  because the warning goes to stderr and nobody reads it
  (aae-orc kos-read-path-gap).

  ## Approach

  1. EdgeType gains Unknown(String) via #[serde(from = "String")]
     with an infallible From<String>: known strings map to variants,
     anything else is preserved verbatim. is_blocking(Unknown) =
     false. Display echoes the raw string. Preserving the author's
     original string serves migration sub-question (d) — a future
     vocabulary sweep reads invented types verbatim instead of
     losing them.
  2. Load-issues become data: read paths (orient, graph, charter,
     drift, compact) load every parseable node and surface unknown-
     edge flags in the OUTPUT (orient header line: "N nodes carry
     unrecognized edge types — run kos validate"), not stderr-only.
  3. validate hard-fails: unknown edge type = FAIL (structural
     check, legitimate gate per orc diagnostic-not-gate rule), and
     exit-code semantics get fixed — validate currently exits 0
     even with 11 parse errors, which makes any lefthook/CI gate
     (bd aae-orc-bs28) a no-op.
  4. Tests: fixture node with `type: related` — orient includes and
     flags it; validate exits nonzero naming node + edge; blocking
     and Display behavior for Unknown covered.
  5. Cut a release so fleet binaries pick the behavior up — hidden
     nodes reappear fleet-wide before any conformance sweep.

  Severable from sub-questions (a)/(b): lenient parsing is needed
  under ANY vocabulary — drift will recur whatever types are legal.

  ## Excluded scope

  - Vocabulary adjudication itself (sub-questions a/b — whether
    relates_to / leaves_open become types)
  - The fleet conformance sweep (bd aae-orc-ow62, blocked on a/b)
  - Collapsing the 9 load loops into one shared loader (nice-to-
    have; minimum viable threads issue lists through existing loops)
