brief:
  hypothesis: |
    ThreeDoors' documentation surface can be decomposed into a kos graph
    with >100 nodes and >100 edges across 6 layers. The graph will surface
    at least 10 cross-document findings that the existing documentation
    doesn't make visible — contradictions, stale decisions, unanswered
    questions, and drift between the app and dark factory halves.

    The YAML-in-git substrate will hold at this scale (read/write <100ms).
    The toolchain (orient, validate, graph, drift) will work without
    modification.

    If the bootstrap produces <50 nodes: the documents are more consistent
    than expected, or the decomposition is too coarse. Adjust granularity.
    If the bootstrap produces >10 findings: kos adds value to a real
    project with existing, disciplined documentation. The review gap
    gradient (B7) predicts signal even in well-governed projects.
  excluded_scope: |
    - Automated extraction (this is human+agent decomposition, not tooling)
    - Code-level correspondence (no code analysis, only doc analysis)
    - Modifying ThreeDoors' documents (read-only probe — findings are
      reported, not remediated)
    - Story-level granularity (411 stories are evidence, not nodes)
    - Building new kos tooling (use existing tools only)
  success_signal: |
    1. kos graph with >100 nodes and >100 edges across 6 layers
    2. >10 cross-document findings surfaced that the project didn't know about
    3. `kos orient threedoors` surfaces meaningful context for each layer
    4. `kos drift` detects real staleness after graph changes
    5. At least 3 findings actionable enough to become ThreeDoors issues/PRs
    6. YAML-in-git substrate holds (read/write <100ms, validate <1s)
  timebox: "2-3 sessions (this is a large probe — layer 1-2 in session-011,
    layers 3-6 across sessions 012-013)"
