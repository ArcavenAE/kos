id: td-arch-phase1
type: element
confidence: frontier
title: "ThreeDoors Phase 1 architecture"
content: |
  Phase 1 architecture: Simple Monolithic CLI Application.
  Two-layer separation (TUI + Tasks). Single process, no external dependencies.
  YAML file storage at ~/.threedoors/tasks.yaml. Bubbletea TUI with MVU pattern.
  Door selection via 1/2/3. Task Detail View (claimed "not in original PRD").
  Five status states: todo, blocked, in-progress, in-review, complete.
  Atomic writes. Constructor dependency injection.

  SELF-CONTRADICTION: Architecture claims Task Detail View is "not in original
  PRD" (line 53) but the PRD Phase 1 scope explicitly includes "Expanded task
  detail view with status actions." Either the architecture was written before
  the PRD was updated, or the architect didn't read the PRD. Either way, the
  provenance chain is broken — the architecture claims to extend the PRD when
  it actually reflects it.
depends_on:
