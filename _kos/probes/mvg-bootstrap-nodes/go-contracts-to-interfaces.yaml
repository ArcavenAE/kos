id: go-contracts-to-interfaces
type: element
confidence: frontier
title: "Generics constraint mechanism changed from contracts to interfaces"
content: |
  The generics overview and contracts draft (go2draft-generics-overview.md,
  Aug 2018) introduces "contracts" as the constraint mechanism for type
  parameters. Contracts use a body-like syntax showing operations:

    contract Equal(t T) {
        t == t
    }

  The type parameter syntax uses parentheses: func F(type T Equal)(x T)

  The final type parameters proposal (43651-type-parameters.md, Aug 2021)
  replaces contracts entirely with interfaces and changes the syntax to
  square brackets:

    func F[T comparable](x T)

  The final proposal explicitly acknowledges this: "This version of the
  design has many similarities to a design draft presented on July 31, 2019,
  but contracts have been removed and replaced by interface types, and the
  syntax has changed."

  Interface types used as constraints gained new capabilities: type elements
  (~T for underlying type, T1 | T2 for unions). This is a complete redesign
  of the constraint system, acknowledged in the later document.

  This seam is acknowledged and handled.
