id: cp-seam-original-note-incomplete
type: finding
confidence: frontier
title: "Original Composition doc's evolution note covers naming but not structural changes"
content: |
  Category 2 (Gap): Partial acknowledgment of evolution

  The original design-doc-composition.md has an italicized note at the top:

    "Note that Composition has evolved since this design document was accepted.
     ...we elected not to build distinct a InfrastructureDefinition and
     ApplicationDefinition, and instead expose a less opinionated
     CompositeResourceDefinition. An 'infrastructure requirement' is now a
     'resource claim'..."

  This note covers NAMING changes (InfrastructureDefinition -> XRD,
  requirement -> claim, publication -> offered). It does NOT cover:
  - The abandonment of ApplicationDefinition entirely
  - The abandonment of Composition immutability
  - The introduction of Composition Functions (the largest structural change)
  - The mode: Pipeline mechanism
  - The shift from "from/to" field naming to "compositeTypeRef/resources"

  The note gives a reader the impression that the evolution was primarily
  cosmetic (renaming), when in fact the system underwent deep structural
  changes. A reader who trusts the note as complete will miss the more
  significant divergences.
edges:
