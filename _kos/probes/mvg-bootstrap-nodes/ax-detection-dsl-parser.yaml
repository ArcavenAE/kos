id: ax-detection-dsl-parser
type: element
confidence: frontier
title: "Detection DSL parser technology disagreement between documents"
content: |
  The CLAUDE.md for ax-orc states:
    "Detection rules use a custom PEG grammar (pest)"

  The architecture-validation-results.md states:
    "Chumsky 0.10 parser + serde YAML: Complementary (Chumsky for DSL, serde for structure)"

  The architecture's implementation handoff says:
    "Create detection engine with Chumsky DSL parser"

  The PRD functional requirements (FR1-FR14) specify YAML/TOML rule definitions
  but don't specify the DSL parser technology.

  pest (PEG parser) and Chumsky (parser combinator) are fundamentally different
  parsing approaches. The CLAUDE.md (project-level context for AI agents) says
  one thing; the architecture says another. An agent following CLAUDE.md would
  implement a pest-based parser; an agent following the architecture would use
  Chumsky.

  This is a Category 1 contradiction. Both documents are authoritative in their
  respective contexts (CLAUDE.md for agent behavior, architecture for design
  decisions), and they disagree on a core implementation choice.
