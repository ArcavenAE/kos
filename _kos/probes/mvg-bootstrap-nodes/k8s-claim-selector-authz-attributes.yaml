id: k8s-claim-selector-authz-attributes
type: element
confidence: frontier
title: "KEP-4601 adds field/label selectors to authorization attributes"
content: |
  KEP-4601 extends authorization attributes with field and label selectors
  for List, Watch, and DeleteCollection verbs. Key design decisions:

  1. Selectors are only added for verbs where they have semantic meaning
     (List, Watch, DeleteCollection). The KEP envisions future extension to
     Get, Create, Update, Patch, Delete.

  2. Selectors can only NARROW access, never broaden it. If an authorizer
     cannot parse a selector, it may authorize without it (broader permission).

  3. The Node authorizer is modified: kubelets can only list/watch pods
     filtered by spec.nodeName=$nodeName.

  4. CEL authorizer gets fieldSelector() and labelSelector() methods.

  5. system:masters bypass is unaffected -- selectors are irrelevant for
     exempt requests that are always allowed.

  Source: keps/sig-auth/4601-authorize-with-selectors/README.md
edges:
