title: "WebUI-first MVP strategy with TUI parity in Growth"
content: |
  The PRD establishes WebUI as the primary interface for MVP:
    - React/TypeScript WebUI with full functionality
    - Dashboard visualizations, investigation canvases, collaborative features
    - TUI achieves 100% feature parity with WebUI when it ships in Growth phase

  The architecture supports this with:
    - alpha-webui as a separate TypeScript/React repository
    - alpha-client crate for CLI (MVP) + TUI (Growth)
    - WebUI communicates via REST API (HTTP/JSON)
    - TUI communicates via HTTP/JSON + SSE

  The "100% feature parity" claim in product-scope.md is extremely ambitious.
  The WebUI includes: drag-and-drop dashboards, MITRE ATT&CK heatmap visualization,
  interactive asset graph exploration, SOC wall display mode, geographic visualization,
  collaborative rule editing (CRDT-based), notification center. Achieving all of these
  in a terminal interface with "100% parity" is a very different engineering challenge
  than building a web dashboard.
