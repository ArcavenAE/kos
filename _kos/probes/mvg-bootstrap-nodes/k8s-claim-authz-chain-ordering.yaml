id: k8s-claim-authz-chain-ordering
type: element
confidence: frontier
title: "KEP-3221 authorization chain is ordered and configurable"
content: |
  KEP-3221 establishes that the authorization chain is explicitly ordered
  via a configuration file. The ordering of authorizers (Node, RBAC, Webhooks)
  is determined by the order specified in the file. Multiple webhooks are
  allowed; other authorizer types appear at most once.

  The chain processes requests sequentially: each authorizer returns Allow,
  Deny, or NoOpinion. The first Allow or Deny is terminal for that authorizer;
  NoOpinion passes to the next in chain.

  system:masters group is always processed by a superuser authorizer that
  runs BEFORE the configured chain. KEP-3221 explicitly lists as a non-goal:
  "Allow ordering of super user authorizer (always allow user group;
  system:masters) so that it can be moved from the beginning of the auth chain."

  Source: keps/sig-auth/3221-structured-authorization-configuration/README.md
edges:
