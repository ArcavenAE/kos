title: "Composition Validating Webhook design"
content: |
  The validation webhook design (Philippe Scorsolini, Status: Draft) proposes
  server-side validation of Compositions at apply time.

  Key points:
  - Two modes: strict (reject if schemas unavailable) and loose (default, warn)
  - Three validation levels: logical, schema-based, rendered resource validation
  - Functions acknowledged as a complication: "having at least a function defined
    would invalidate the assumption that rendered Managed Resources should be
    valid according to the schema"
  - Functions usage should "short-circuit any unnecessary check"

  The document references Composition functions as an alpha feature
  (references `functions` field, not `pipeline`), suggesting it was written
  before or during the alpha-to-beta transition.

  Source: /tmp/kos-probes/crossplane/design/design-doc-composition-validating-webhook.md
