id: ax-dissector-plugin-phase-conflict
type: element
confidence: frontier
title: "plugin system labeled MVP but depends on Growth features"
content: |
  The functional requirements section "plugin system (MVP)"
  (FR314-FR338) declares the WebAssembly plugin system as MVP scope.

  However, multiple FRs within this section depend on features that are
  explicitly Growth-phase:
    - FR320-324 (Dissector-to-Graph Integration) depend on the Asset Graph,
      which is Growth (FR185-204)
    - FR325-329 (Dissector-to-query DSL Integration) require session
      conditions and graph conditions, which are Growth features (FR291-308)

  The architecture (native-packet-capture-engine.md) describes the dissector
  system as "Native + WASM Hybrid" with deep integration into the graph and
  query DSL — both Growth features.

  This creates an implicit dependency: implementing the full plugin extension
  system at MVP requires implementing Growth-phase features (graph, session
  detection) that aren't scheduled until later. Either the plugin extension
  system needs to ship in a reduced form at MVP (without graph/DSL integration),
  or the phase boundaries need adjustment.

  The PRD product-scope.md doesn't mention the plugin system at all — it only
  references OT protocol parsing and edge collectors. The plugin architecture
  was introduced in the architecture phase without a corresponding PRD entry.
depends_on:
  - ax-mvp-scope-inflation
