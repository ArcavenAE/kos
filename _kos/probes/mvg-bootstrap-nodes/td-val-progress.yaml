title: "Progress over perfection"
content: |
  Core design value: any improvement matters. Better today than yesterday.
  Appears in executive-summary.md as "Core Philosophy" and in product-scope.md
  as a Phase 1 requirement ("progress over perfection messaging in interface").

  The value is declared in the vision but its operationalization differs:
  - Executive summary: frames it as philosophy
  - Product scope: reduces it to a UI message
  - Architecture: doesn't mention it at all

  Graph signal: a value node with no dependency path to architectural decisions
  is either decorative or unimplemented.
