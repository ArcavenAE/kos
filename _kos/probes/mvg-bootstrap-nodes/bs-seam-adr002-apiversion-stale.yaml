id: bs-seam-adr002-apiversion-stale
type: element
confidence: frontier
title: "Stale claim: ADR002 promises v1 graduation that has not happened"
content: |
  Category: Temporal drift (a claim about future state that became stale).

  ADR002 states: "Early versions of the catalog will be using alpha/beta
  versions, e.g., backstage.io/v1alpha1 to signal that the format may
  still change. After that, we will be using backstage.io/v1 and up."

  This ADR was written in 2020. As of 2024-2025 (the BEP dates), all
  catalog examples across ADRs and BEPs still use backstage.io/v1alpha1.
  BEP-0009, BEP-0002, and BEP-0003 all implicitly assume the alpha API
  version as the current reality without noting the discrepancy with
  ADR002's stated plan.

  No ADR or BEP formally supersedes ADR002's graduation promise or
  explains why v1 has not been reached. The alpha label has become
  effectively permanent -- stable enough to build BEPs on top of,
  but still technically marked as "may change."

  This is not a functional problem (the system works fine with
  v1alpha1), but it is an example of a document making a claim about
  future state that went stale and was never corrected.

  Sources: ADR002 (apiVersion graduation), ADR005/BEP-0009 (continued
  use of v1alpha1)
