title: "PEP 604: X | Y union type syntax, superseding Union[X, Y]"
content: |
  PEP 604 (Python 3.10, 2019) adds the | operator for union types,
  providing syntactic sugar for PEP 484's Union[X, Y].
  Key claims:

  1. X | Y is equivalent to Union[X, Y]. Explicitly states equivalence.
  2. None | T is equivalent to Optional[T].
  3. The | syntax works in isinstance() and issubclass() calls.
  4. Creates a new types.Union type at runtime to hold the result.
  5. Interoperability between types.Union and typing.Union is required.

  This PEP is purely syntactic — it adds no new type system semantics.

  Source: pep-0604.rst (Status: Final)
