id: brief-ripple-engine-design
type: brief
confidence: frontier
title: "Q2 probe: ripple engine design — surfacing signal without noise"
content: |
  Open question 2: How does the ripple engine surface conflicts to humans
  without creating noise that gets ignored?

  Sharpened by session-003:
  - Finding-016: code-derived and doc-derived nodes have different signal
    profiles. Ripple must propagate across lenses.
  - Finding-017: edges flatten epistemological character. Ripple must
    propagate across edges that don't carry their own epistemological
    weight — a derives-from-evidence edge and a derives-from-conviction
    edge look identical to the engine.

  ## Approach

  This is a DESIGN probe, not an empirical one. Propose a ripple mechanism,
  then test it against existing findings to see if it would have surfaced
  the right signal and suppressed the noise.

  Specifically: replay the twelve-project probe data (findings 001-014)
  through the proposed mechanism. For each finding:
  1. Would ripple have detected it? (sensitivity)
  2. Would ripple have surfaced it at the right severity? (calibration)
  3. What false positives would ripple have generated? (noise)

  The test is retrospective — we know what the probes found, so we can
  check whether a proposed engine would have found the same things.

  ## Design constraints (from existing bedrock and findings)

  - Dirty propagation, not eager computation (B3 — git substrate,
    immutable facts, current state is a view)
  - Must handle cross-lens ripple: code change → doc-derived node
    and vice versa (finding-016)
  - Must handle epistemologically flat edges without generating
    false-severity signals (finding-017)
  - Signal classification (error/evolution/drift) already exists on
    edges — the engine should USE this, not duplicate it
  - Human judgment required for classification (finding-014) — the
    engine detects, the human classifies
  - The process quality gradient (B7) means noise tolerance varies
    by project governance maturity

