brief:
  hypothesis: |
    A ripple engine based on dirty-flag propagation along typed edges,
    with severity attenuation by distance and edge type, can surface
    the signal found in the twelve-project probe while generating
    fewer false positives than "mark everything dirty."

    The key mechanism: not all edges propagate equally. A contradicts
    edge is a hard signal (always propagate). A derives edge attenuates
    with distance. A supersedes edge STOPS propagation (the newer node
    absorbs the change). Cross-lens edges (correspondence) propagate
    at reduced confidence (inferred, not declared).
  excluded_scope: |
    - Implementation (no code, just mechanism design)
    - Executive loop (Q3 — how ripple gets scheduled)
    - Automated classification (human does this)
    - Tooling for surfacing (UI/notification concerns)
  success_signal: |
    1. A proposed mechanism with clear propagation rules
    2. Retrospective test: mechanism would have detected at least 8 of
       the 11 project-alpha issues from finding-003
    3. Retrospective test: mechanism would NOT have generated more than
       3 false positives (signals that look dirty but aren't real issues)
    4. Cross-lens propagation rules that handle finding-016's
       complementary signal problem

    If all four: confirms (ripple design is viable).
    If 1-2 only: partial (detection works, calibration doesn't).
    If mechanism can't handle cross-lens: redirects (need different
    architecture for multi-lens graphs).
  timebox: "Session-003, third probe cycle"
