id: brief-what-cant-be-a-node
type: brief
confidence: frontier
title: "Q5 probe (narrow): What can't be a node?"
content: |
  Open question 5 (narrowed): Where does the graph model fail? Specifically,
  what kinds of knowledge drive real decisions but resist decomposition into
  typed nodes with edges?

  A node has: id, type, confidence, content, edges, provenance. Everything
  in the graph must fit this structure. The question is: what important
  things DON'T fit, and what happens when you force them?

  ## Approach

  Two test subjects, chosen for different reasons:

  1. KOS itself (sessions 001-003). This project has been making decisions
     for three sessions. We have full provenance. We can ask: what drove
     each decision, and can the driver be expressed as a node? Use git
     history, findings, charter revisions, and the conversation record
     (the commits are the trace).

  2. Axiathon decision archaeology. We've already decomposed axiathon
     twice (docs, code). Now decompose the DECISIONS — not what was
     decided, but WHY. For each major architectural choice visible in
     the code or docs, attempt to express the reasoning as a node.
     Where does the reasoning resist?

  ## Categories to test

  Hypothesized classes of knowledge that may resist node decomposition:

  a. TACIT EXPERTISE: "We chose X because the team knows X" — the
     knowledge that makes a choice load-bearing lives in heads, not docs
  b. POLITICAL/ORGANIZATIONAL: "We deprioritized Y because the client
     demo is next week" — temporal pressure, authority, stakeholder dynamics
  c. AESTHETIC/JUDGMENT: "This feels over-engineered" — pattern recognition
     that resists decomposition into claims
  d. META-PROCESS: "The human corrected the agent's interpretation" —
     the act of improving the graph is itself knowledge not in the graph
  e. NEGATIVE SPACE: "We didn't consider Z" — absence of exploration,
     which is different from graveyard (tried and rejected)

  The probe succeeds if it finds at least one class that genuinely
  can't be a node (not just "hard to express" but "loses essential
  character when forced into the structure").

