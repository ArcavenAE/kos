brief:
  hypothesis: |
    At least two of the five hypothesized categories (tacit, political,
    aesthetic, meta-process, negative space) will resist node decomposition
    in a way that is NOT solved by "just add more content to the node."
    The failure will be structural — the node schema flattens something
    that matters. The graph will have a describable blind spot.
  excluded_scope: |
    - Broad failure mode analysis (only testing "what can't be a node")
    - Signal-to-noise ratio question (angle 2 — separate probe)
    - Redundancy question (angle 1 — separate probe)
    - Tooling or automation
  success_signal: |
    1. At least 3 real decisions from KOS or axiathon are tested for
       node-decomposability
    2. At least 1 class of knowledge is identified that genuinely resists
       (not just "is hard")
    3. The resistance is characterized precisely enough to know whether
       it's a schema limitation, a fundamental limit of typed graphs, or
       a scope boundary (things the graph shouldn't try to capture)

    If all three: confirms (the graph has a describable blind spot).
    If decisions decompose cleanly: redirects (the hypothesis was wrong,
    everything CAN be a node, or we tested the wrong decisions).
  timebox: "Session-003, second probe cycle"
