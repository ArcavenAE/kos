id: brief-kos-orient
type: brief
confidence: frontier
title: "Build kos orient — cross-repo orientation CLI"
content: |
  First implementation probe. Build a CLI tool that, from any directory
  in the aae-orc ecosystem, surfaces relevant knowledge: open frontier
  questions, findings, RD briefs, and charter items for the current repo.

  This serves charter F10 (cross-repo knowledge continuity) and marvel
  F-08 ("this is kos's problem"). The tool doesn't need a graph database.
  It needs to read existing artifacts (charter, RD briefs, CLAUDE.md files,
  kos nodes) and present the relevant subset.

  ## What the tool does

  `kos orient` (or `kos orient marvel`) reads:
  1. aae-orc charter (bedrock, frontier, graveyard) — filters items
     mentioning the target repo
  2. sprint/rd/*.md — finds RD briefs involving the target repo
  3. kos findings — finds findings that reference the target repo
  4. subrepo CLAUDE.md — reads the target repo's own context
  5. kos frontier questions — surfaces open questions relevant to target

  Output: human-readable summary (default) and JSONL (--json flag),
  following the ThreeDoors retrospector pattern for machine consumption.

  ## Language decision

  Rust. kos is a correctness tool — its job is detecting silent corruption
  in typed structures. Rust's type system mirrors the kos schema: node types,
  edge types, confidence states, and signal classifications become enums with
  exhaustive pattern matching. A forgotten case is a compile error, not a
  silent bug. This is the same property kos provides to spec documents —
  structural correctness enforced by the system, not by convention.

  The ecosystem leans Go (marvel, switchboard, ai, ourbot), but kos's nature
  is different from those tools. Marvel manages processes. Switchboard relays
  sessions. kos enforces typed structure — the problem Rust was built for.
  Paying the startup cost now (cargo instead of just, new CI templates)
  sidesteps a probable Go-to-Rust refactor after significant investment.

  Prior art in the portfolio: axiathon (mature Rust, excellent test patterns,
  CI/CD templates), jira-cli (Rust, Homebrew distribution, Apple code signing).
  Build infrastructure for Rust binaries with Homebrew tap and macOS packaging
  already exists and can be adapted.

  ## Scope

  MVP is read-only orientation. No graph mutations, no node creation,
  no ripple. Just: "given where I am, what should I know?"

  Later: `kos validate` (schema), `kos graph` (render), `kos drift`
  (ripple). These are separate probes.

