brief:
  hypothesis: |
    A Rust CLI that reads existing YAML/markdown artifacts across the
    aae-orc repo tree can provide useful cross-repo orientation without
    any new infrastructure. The YAML-in-git substrate is sufficient for
    a read-only tool at current scale (~25 nodes, ~48 RD findings, 1
    charter, 8 subrepos). serde_yaml deserializes YAML directly into
    typed Rust structs — the schema validation is partially free.

    If the tool is useful: confirms that simple file I/O is sufficient
    for the orientation use case at current scale.
    If reading is too slow or the relevance filtering is too noisy:
    partial — needs indexing or structured metadata.
    If the artifact formats are too inconsistent to parse reliably:
    redirects — the RD briefs need standardization before tooling.
  excluded_scope: |
    - Graph mutations (no node creation or editing)
    - Ripple / drift detection (separate probe)
    - Schema validation (separate probe)
    - Graph rendering (separate probe)
    - Any infrastructure beyond Rust + file I/O + git
  success_signal: |
    1. `kos orient` from aae-orc/marvel/ shows marvel's frontier items,
       RD findings, and open questions
    2. `kos orient` from aae-orc/forestage/ shows forestage's relevant context
    3. `kos orient` from aae-orc/kos/ shows kos's own state
    4. --json flag produces JSONL consumable by agents
    5. The tool runs in < 2 seconds on the current repo tree
    6. At least one instance where the tool surfaces knowledge that
       would have been missed by reading only the subrepo's CLAUDE.md
  timebox: "Session-006 (one session)"
