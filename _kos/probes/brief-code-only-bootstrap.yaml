id: brief-code-only-bootstrap
type: brief
confidence: frontier
title: "Code-only bootstrap probe — can the graph be seeded from code and git history alone?"
content: |
  Open question 4: Can the graph bootstrap from a codebase with no existing
  spec, using only code structure and git history?

  F4 established that manual bootstrap (human+agent reading documents) works.
  This probe tests the harder case: what if there are no documents? Can code
  structure, git history, commit messages, and naming conventions produce
  enough signal to seed a useful graph?

  ## Approach

  Use a controlled test with ground truth. Take one of the previously-probed
  projects (ThreeDoors or axiathon) and attempt bootstrap using ONLY:
  - Source code files
  - Git log and commit messages
  - Git blame
  - Directory structure and naming
  - Test files and CI configuration
  - README (if it exists — but not PRDs, architecture docs, or planning artifacts)

  Deliberately ignore all BMAD documents, PRDs, architecture docs, and planning
  artifacts. Produce a set of inferred nodes. Then compare against findings
  001-003 (which used the full document set) to measure:
  1. What the code-only graph catches that the doc-based graph also caught
  2. What the code-only graph misses
  3. What the code-only graph finds that the doc-based graph did NOT find

  ## Why controlled test over true code-only repo

  A repo with zero docs has no ground truth to compare against. We can't
  measure what was missed. Using a previously-probed project gives us a
  baseline. The comparison IS the finding.

  ## Target: axiathon (via ax-orc)

  axiathon over ThreeDoors because:
  - Finding-003 found 11 issues including systematic phase boundary erosion
    and the "ALL GAPS RESOLVED" self-deception — rich ground truth
  - Rust codebase with strong type system — code structure carries more
    semantic signal than a Go TUI app
  - Sharded PRD gives us many document-derived claims to check against

