brief:
  hypothesis: |
    Code structure and git history contain enough signal to bootstrap a
    partial graph that catches at least SOME of the issues found by
    document-based probing. Specifically: architectural contradictions
    that manifest in code (wrong parser, missing modules, dead code paths)
    should be detectable. Document-only contradictions (PRD says X,
    architecture doc says Y, but neither is in code yet) will be invisible.
    The code-only graph will find a different class of signal — drift
    between intent (commit messages) and reality (current code state).
  excluded_scope: |
    - Automated tooling for extraction (this is manual agent work)
    - Embedding-based similarity matching
    - AST parsing beyond what the agent can do by reading code
    - Any document in the project's planning/BMAD directories
  success_signal: |
    1. Code-only bootstrap produces at least 5 typed nodes that conform
       to the KOS schema
    2. At least 2 of the 11 issues from finding-003 are independently
       rediscovered from code alone
    3. At least 1 issue is found that finding-003 missed (code-only signal)

    If all three: confirms (code-only bootstrap viable, produces
    complementary signal).
    If 1-2 only: partial (code-only produces nodes but limited signal).
    If decomposition fails: redirects (code structure insufficient for
    graph seeding without documents).
  timebox: "Session-003, first probe cycle"
