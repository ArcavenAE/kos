brief:
  hypothesis: |
    Content hashing + edge walking detects meaningful staleness in a
    25-node graph with 18 edges. At least 60% of nodes are reachable
    via edges (not isolated). False positive rate from content hashing
    is < 20% (formatting-only changes are rare in YAML nodes).
  excluded_scope: |
    - Full dirty state classification (DIRTY_HARD/SOFT/STALE)
    - Source-type weighting
    - Cross-lens propagation via correspondence
    - Automatic remediation or fix suggestions
    - Multi-graph (--merged) drift detection
  success_signal: |
    1. `kos drift` runs and reports baseline (all nodes, hashes, edge coverage)
    2. After modifying one node, `kos drift` detects the change and flags dependents
    3. Edge coverage report shows how many nodes are reachable vs isolated
    4. The snapshot file is small, human-readable, and diffable
