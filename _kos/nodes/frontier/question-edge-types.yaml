id: question-edge-types
type: question
confidence: frontier
title: "What relationship types beyond depends_on does the schema need?"
content: |
  The MVG bootstrap probe (finding-001) revealed that depends_on alone
  cannot express the full range of inter-node relationships:

  - implements: architecture claims to realize a PRD requirement
  - contradicts: two nodes make incompatible claims about the same element
  - supersedes: a newer document replaces an older one
  - refines: a node adds detail to another without replacing it

  depends_on expresses derivation but not the NATURE of the relationship.
  When td-arch-phase1 depends_on td-phase1-scope, we can't tell from the
  edge whether the architecture implements, extends, or contradicts the scope.

  The correspondence type in the schema already has link_type (implements,
  tests, explores, extends, violates, obsoletes) but only for spec-to-code
  links. The question is whether spec-to-spec relationships need the same
  treatment.

  Key constraint: type proliferation is a smell (per schema notes).
  The answer should be the minimum set that makes contradictions
  structurally detectable.

  PROBED in session-002. See finding-004-schema-revision.
  Result: CONFIRMS. Four edge types added to schema v0.2:
  derives, implements, contradicts, supersedes. Tested against three
  existing probe nodes. Contradictions moved from content to structure.
  refines was dropped — not needed by evidence. Four types, not five.

  FURTHER VALIDATED in twelve-project broadening probe. Four edge types
  plus signal classification (error/evolution/drift, added in v0.3)
  covered all twelve projects. No additional edge types needed.
  This question is answered.
