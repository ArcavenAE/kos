title: "How does the ripple engine surface conflicts without noise?"
content: |
  The ripple engine must surface drift and invalidation to humans without
  creating a noise floor that gets ignored. Too many signals = all signals
  ignored. Too few = silent corruption persists.

  What is the right granularity and frequency of ripple reporting?
  What filters distinguish signal from noise? Who sees which reports?
