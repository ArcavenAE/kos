title: "How does context transfer across sessions practically?"
content: |
  The human carries continuity. The AI carries inference within a session.
  The charter re-introduction document is the current handoff mechanism.

  Is the charter sufficient for full context restoration? What's lost
  in the compression? How does the handoff degrade as the graph grows
  and the charter can no longer summarize it fully?

  At what scale does the charter-as-handoff break, and what replaces it?
