id: question-fitness-functions-from-graph
type: question
confidence: frontier
title: "Can executable fitness functions be derived from kos graph structure?"
content: |
  The lifecycle research synthesis claims: encoding specification
  architectural constraints as executable fitness functions (Ford-Parsons-
  Kua framework, "Building Evolutionary Architectures") will detect drift
  violations before merge, reducing post-ship architecture violations
  by 90%+.

  The lifecycle tier definitions propose that design rules (architectural
  invariants per Baldwin & Clark) should be verifiable — ideally through
  fitness functions. Examples from axiathon: acyclic crate dependencies,
  all public APIs accept TenantContext first, all errors implement
  std::error::Error, no crate directly accesses another's storage.

  Hypothesis: kos bedrock nodes that describe architectural constraints
  could generate executable checks. A bedrock node that says "all HTTP
  handlers must validate auth tokens" could generate a grep/AST check
  that runs in CI. The graph becomes not just a knowledge store but a
  source of executable validation.

  This would close the gap between kos (knowledge) and enforcement
  (gates). Currently kos describes what should be true. Fitness functions
  verify that it IS true. The bridge from description to verification
  is the fitness function derivation.

  Testable by: taking 5 bedrock architectural constraint nodes from a
  real project and attempting to generate executable checks from their
  content. Measure: how many can be automated? How many require human
  interpretation?

  Open question: is this a kos feature (kos generates checks) or a
  bridge feature (kos exports to CI tooling that generates checks)?
