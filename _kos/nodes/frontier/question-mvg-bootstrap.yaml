title: "What is the minimum viable graph?"
content: |
  What is the minimum viable implementation that demonstrates the checksum
  property against an existing SDD process?

  Specifically: can the graph bootstrap from existing artifacts (documents,
  git history, code) with no prior spec nodes, using only inferred
  correspondences? At what point does inferred-only coverage become
  useful versus noisy?

  PROBED in session-002. See finding-001-mvg-bootstrap.
  Result: PARTIAL. The checksum property is real — the graph surfaces
  inter-document inconsistencies invisible in individual documents.
  The schema is sufficient for decomposition but needs edge types
  beyond depends_on and temporal state handling.
  Spawned: question-edge-types, question-temporal-state.
