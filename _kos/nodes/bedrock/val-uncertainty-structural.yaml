id: val-uncertainty-structural
type: value
confidence: bedrock
title: "Uncertainty is structural, not rhetorical"
content: |
  Confidence must be declared, not performed. Current documentation
  practices perform confidence — specs are written as if everything is known.
  This is dishonest and dangerous: it obscures what is actually bedrock
  from what is a guess dressed in authoritative language.

  A knowledge system that does not represent its own confidence level
  is untrustworthy by design. Every spec element carries an explicit
  confidence classification. Uncertainty is a first-class value.
