id: elem-fractal-lifecycle
type: element
confidence: bedrock
title: "Lifecycles are fractal — same pattern at product, feature, bug, spike scale"
content: |
  The same lifecycle pattern repeats at different scales. Each level
  inherits structure and validators from the parent but operates at
  reduced scope and speed. Validated through multiple instances:

  Product scale: full lifecycle (Brief → PRD → Architecture → Build → Ship → Learn)
  Feature scale: inherits product context, produces deltas
  Bug scale: lightest — inherits everything, produces fix + drift signal
  Spike scale: structured exploration with fold-back to parent

  Key principle: a feature lifecycle is not a COPY of the product
  lifecycle — it's a VARIANT that inherits context and produces deltas.
  When any scale's output diverges from the parent's specs, the ripple
  mechanism updates upstream.

  Validated instances:
  - schema-normalization spike in partner-orchestrator followed the spike lifecycle
    retroactively, producing charter, findings, review, fold-back
  - xMP project's cross-track divergence demonstrated the need for
    fractal gates at each scale
  - kos's own process (Orient → Question → Probe → Harvest → Promote)
    is a lifecycle variant — same structure as the product lifecycle
    but parameterized for knowledge exploration

  This principle is supported by Beer's recursive viability theorem
  (viable systems contain models of themselves at every level) and
  Ashby's law of requisite variety (regulatory capacity must match
  disturbance variety).

  Implication for kos: the process cycle should be explicitly fractal.
  A 104-node bootstrap and a single-question probe should use the same
  pattern but different depth and ceremony. Success signals (gates)
  should be depth-appropriate — not the same template for every scale.
