id: elem-seven-channel-protocol
type: element
confidence: bedrock
title: "Seven communication channels for tiered systems: Intent, Coordination, Status, Finding, Audit, Query, Alert"
content: |
  The lifecycle tier communication protocol defines seven channels
  derived from Beer's VSM, McChrystal's shared consciousness, and
  gap analysis of real projects:

  | Channel | Direction | Mode | Purpose |
  |---|---|---|---|
  | Intent | Down | Async | Specs, contracts, design rules, ACs |
  | Coordination | Lateral | Structural | Contracts, CI, type system, branch strategy |
  | Status | Up | Async | Progress, completion, metrics |
  | Finding | Up | Async | Discoveries challenging specs (delivery findings, SCRs) |
  | Audit | Down (sporadic) | Async/Sync | Fitness functions, spot checks, drift detection |
  | Query | Both | Sync | Clarification/decision requests requiring judgment |
  | Alert | Up (bypass) | Sync | Emergency escalation (algedonic signals) |

  Design principles:
  - Structural over conversational (mechanisms > meetings)
  - Upward flow must equal downward flow
  - Algedonic signals bypass normal channels
  - Async default, sync by exception
  - All decisions captured in specs, not left in chat

  kos mapping:
  - Intent → kos nodes (bedrock decisions, requirements, architecture)
  - Coordination → kos edges (derives, implements, contracts)
  - Status → not in kos (operational, not knowledge)
  - Finding → kos findings (the upward channel)
  - Audit → kos drift + validate (sporadic integrity checks)
  - Query → kos questions (frontier nodes awaiting resolution)
  - Alert → not in kos yet (no emergency/algedonic mechanism)

  The Coordination channel is particularly important: it's structural,
  not conversational. CI pipelines, type systems, git branch strategy,
  cross-domain contracts — these are S2 (anti-oscillation) mechanisms.
  kos edges could serve this role if they enforce constraints rather
  than merely document relationships.
