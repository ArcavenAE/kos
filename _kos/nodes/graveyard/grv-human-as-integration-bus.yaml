id: grv-human-as-integration-bus
type: element
confidence: graveyard
title: "Human-as-integration-bus for session continuity does not scale"
content: |
  BMAD requires the human to perform every handoff between agents and
  sessions. The user starts a workflow, completes it, manually starts
  the next in a new session, carries context, threads results back.
  The human is the step function, the context carrier, and the single
  point of failure.

  For simple projects this is manageable. For multi-epic, multi-sprint
  work, the human becomes the bottleneck AND the single point of failure
  for context continuity. When reality intervenes (requirement discovered
  wrong mid-implementation), the linear chain fractures into ad-hoc
  jumps with no record of the actual execution path.

  kos connection: kos's session protocol says "read charter.md (orient)"
  at session start. This IS the human-as-integration-bus pattern — the
  charter is context that the human loads manually into each new session.
  kos orient partially automates this, but the LLM still carries context
  between sessions only through what the human writes into the graph.

  The universal bridge idea and the gathering-vs-interpreting question
  are both attempts to reduce dependency on the human as context carrier.
  If kos can gather and structure context automatically, the human's
  role shifts from "carry everything" to "validate and direct."
edges:
