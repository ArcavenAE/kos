id: question-executive-mechanism
type: question
confidence: frontier
title: "What is the executive mechanism as software?"
content: |
  The executive loop is described functionally: query graph → infer →
  generate candidate → verify → harvest or graveyard → update → repeat.

  What runs this as software? Scheduler? Event system? Agent orchestration?
  How does it allocate attention across the graph? How does it maintain
  coherence of purpose across sessions when the inference layer is amnesiac?
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: question-ripple-noise
type: question
confidence: frontier
title: "How does the ripple engine surface conflicts without noise?"
content: |
  The ripple engine must surface drift and invalidation to humans without
  creating a noise floor that gets ignored. Too many signals = all signals
  ignored. Too few = silent corruption persists.

  What is the right granularity and frequency of ripple reporting?
  What filters distinguish signal from noise? Who sees which reports?
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: question-node-schema-validity
type: question
confidence: frontier
title: "Does the node schema hold under real use?"
content: |
  The node schema (v0.1) was designed without implementation experience.
  This seed file is the first real use. Specific unknowns:

  - Is the type enum right? Too many types? Too few?
  - Is depends_on at the right granularity?
  - Do the graveyard fields capture what we actually need?
  - Is the correspondence code_node format (path:symbol) sufficient?
  - Does one-node-per-file scale or become unwieldy?

  This question is answered by using the schema and noting friction.
