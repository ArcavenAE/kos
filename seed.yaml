# ─────────────────────────────────────────────
# VALUES
# ─────────────────────────────────────────────

---
id: val-spec-is-product
type: value
confidence: bedrock
title: "The spec is the product"
content: |
  Code is a sketch medium. Cheap, parallel, disposable. What is expensive
  is accumulated understanding. The spec is where that lives. Code implements
  the spec. Code is evidence. Understanding is the deliverable.

  This principle inverts the classical order: build to learn, then encode
  what was learned into the spec. The spec matures from probe findings,
  not from upfront planning.
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: val-uncertainty-structural
type: value
confidence: bedrock
title: "Uncertainty is structural, not rhetorical"
content: |
  Confidence must be declared, not performed. Current documentation
  practices perform confidence — specs are written as if everything is known.
  This is dishonest and dangerous: it obscures what is actually bedrock
  from what is a guess dressed in authoritative language.

  A knowledge system that does not represent its own confidence level
  is untrustworthy by design. Every spec element carries an explicit
  confidence classification. Uncertainty is a first-class value.
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: val-typed-traversable
type: value
confidence: bedrock
title: "Understanding-execution relationship must be typed and traversable"
content: |
  The relationship between spec understanding and code execution must be
  typed, versioned, and traversable in both directions — or it will
  silently corrupt.

  Untyped relationships decay. Changes propagate invisibly. Agent
  mismatches produce plausible-looking wrong output. The correspondence
  layer exists because a hyperlink and a foreign key constraint both
  reference something, but only one tells you when the reference breaks.
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

# ─────────────────────────────────────────────
# NON-GOALS
# ─────────────────────────────────────────────

---
id: ng-replace-sdd
type: non-goal
confidence: bedrock
title: "Do not replace existing SDD processes"
content: |
  KOS runs alongside existing SDD systems. It does not require teams to
  change their tools or workflows. Existing documents (PRDs, ADRs,
  architecture docs) are ingested as low-confidence inferred nodes —
  valid but lossy projections of the graph.

  The transition from shadow to graph as source of truth happens gradually,
  not by flag day. This is a strategic non-goal: replacing existing processes
  creates adoption friction that would kill the project before it demonstrates value.
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: ng-better-document-format
type: non-goal
confidence: bedrock
title: "Not a better document format"
content: |
  Documents are a rendering format for human consumption — a projection
  of the graph, not the source of truth. KOS is not a new document schema,
  a new wiki, or a new way to organize markdown files.

  The graph is the source. Documents are views over it.
provenance:
  created_by: human
  session: session-001
  created_at: 2026-03-15

---
id: ng-permanent-solution
type: non-goal
confidence: bedrock
title: "Not a permanent solution"
content: |
  KOS is a moment in time. It will be superseded. That is not a flaw —
  it is evidence that it belongs to the same lineage as everything it
  builds on. The goal is useful-for-a-time, not final.

  Building as if this must last forever would front-load design investment
  in exactly the way the process is designed to avoid.
