# KOS Node Schema
# Version: 0.3
# Status: FRONTIER
# Purpose: Minimum viable spec node — human-writable, agent-parseable,
#          no tooling required. Validate under real use, then revise.
#
# Revision history:
#   0.1 — session-001: initial design, unvalidated
#   0.2 — session-002: added typed edges (replaces depends_on),
#          based on three-project probe (findings 001-003).
#          See finding-004-schema-revision for rationale.
#   0.3 — session-002: added signal classification on edges,
#          based on twelve-project probe (findings 001-013).
#          See finding-014-twelve-project-synthesis for rationale.

# ─────────────────────────────────────────────
# REQUIRED FIELDS (every node)
# ─────────────────────────────────────────────

id:
  type: string
  format: "[type-prefix]-[short-slug]"
  description: >
    Stable, unique, never reused. If a node is graveyarded,
    its id is retired — not reassigned. Slugs should be
    meaningful to a human reading a dependency list.
  examples:
    - val-uncertainty-first
    - elem-node-schema
    - question-executive-mechanism
    - grv-waterfall-frontload

type:
  type: enum
  values:
    value:        "A design principle. Resolves tradeoffs. Load-bearing."
    non-goal:     "Explicit exclusion. What this system must never become."
    question:     "An open unknown. The unit of work."
    brief:        "Exploration brief for a probe. One question, one timebox."
    finding:      "Result of a probe. Evidence, not opinion."
    element:      "General spec element — behavior, data, architecture, process."
    graveyard:    "Tried, ruled out, permanently recorded. Append-only."
    correspondence: "Typed link between a spec node and a code node."
  notes: >
    Start with this set. Add types only when an existing type
    genuinely cannot carry the meaning. Type proliferation is a smell.

confidence:
  type: enum
  values:
    bedrock:      "Committed. Evidence-based. Changing this breaks dependents."
    frontier:     "Active hypothesis. Expected to hold but may change."
    placeholder:  "Known unknown. Honest marker. Not a guess dressed as fact."
    graveyard:    "Closed. Append-only. Never promoted back without new evidence."
  notes: >
    Confidence is not quality. A placeholder is not a failure —
    it is the most honest thing a spec can say.

    Confidence is EPISTEMIC, not temporal. It says how certain we are,
    not what lifecycle state something is in. Temporal state (planned,
    completed, validated) is not a schema field — it is either:
    (a) derived from graph topology (a question with a finding is answered),
    (b) expressed as content in the node, or
    (c) a contradiction between nodes when two sources disagree about
        temporal state (detectable via contradicts edges).
    See finding-004-schema-revision for rationale.

title:
  type: string
  description: "Short human label. Enough to identify in a dependency list."

content:
  type: string (markdown)
  description: >
    The substance of the node. Free text, markdown acceptable.
    For graveyard nodes: what was tried and what was learned.
    For finding nodes: what the probe revealed, not what was hoped.
    For question nodes: the question precisely stated — vague
    questions produce vague probes.

# ─────────────────────────────────────────────
# EDGE FIELDS
# ─────────────────────────────────────────────

edges:
  type: list of typed edges
  required: false
  description: >
    Typed relationships to other nodes. Each edge has a target
    (node id), a type, and an optional note.

    Edge types:
      derives:      "This node was built from or grounded in the target.
                     When the target changes, this node may be dirty.
                     Equivalent to the v0.1 depends_on relationship."
      implements:   "This node claims to realize the target's specification.
                     The target is the spec; this node is the implementation.
                     Valid for architecture→PRD, code→spec, etc."
      contradicts:  "This node and the target make incompatible claims
                     about the same concept. Bidirectional in meaning
                     (if A contradicts B, B contradicts A) but only needs
                     to be declared on one side. Highest-severity signal."
      supersedes:   "This node replaces the target. The target remains
                     readable but is no longer authoritative. Directional:
                     the newer node supersedes the older."
      supports:     "This node enables or contributes to the target.
                     Weaker than implements — the node doesn't realize
                     the target's specification, but makes it possible
                     or easier. Example: a library supports a platform."
      instantiates: "This node is a concrete example of the target
                     principle, pattern, or value. The target is abstract;
                     this node demonstrates it in practice."
      partially_resolves: "This node addresses some aspects of the target
                     question without fully resolving it. The target
                     remains open but this node contributes evidence
                     or partial answers."

  format:
    - target: node-id
      type: derives | implements | contradicts | supersedes | supports | instantiates | partially_resolves
      signal: "Optional. error | evolution | drift"
      note: "Optional. One-line explanation of the relationship."

  notes: >
    Use edges to express the NATURE of the relationship, not just
    its existence. A contradicts edge makes inconsistencies detectable
    by graph traversal alone — without reading content fields.

    Contradicts edges should be placed between the two conflicting
    source nodes when possible, not on a third-party finding node.
    The finding node derives from both sources; the sources
    contradict each other.

    Start with this set of four edge types. Add types only when an
    existing type genuinely cannot carry the meaning.

# ─────────────────────────────────────────────
# SIGNAL CLASSIFICATION
# ─────────────────────────────────────────────
#
# The graph surfaces signal at document seams. But not all signal
# is the same kind of problem. Signal classification tells you
# what to DO with what the graph found.
#
# Signal types (optional field on edges):
#
#   error:      "Genuine inconsistency. Something is wrong. The two
#                nodes cannot both be true and no supersession was
#                declared. Requires resolution."
#                Example: PRD says tasks.txt, architecture says tasks.yaml.
#
#   evolution:  "Intentional change. The later node deliberately replaces
#                or modifies the earlier node's claim. Not a bug — normal
#                design progression. Should have a supersedes edge."
#                Example: Rust Pin<'a, T> became Pin<P> by design.
#
#   drift:      "Unintentional staleness. A reference, count, or term
#                went stale when something else changed. Low severity,
#                high frequency. Usually fixable by updating the stale
#                reference."
#                Example: README says 35 fragments, actual count is 42.
#
# Signal classification requires human judgment. The graph detects
# that two nodes disagree. Whether that disagreement is an error,
# intended evolution, or drift is a judgment call that depends on
# context the graph doesn't have.
#
# When signal is omitted, the edge is unclassified. Unclassified
# edges are the default for newly detected inconsistencies —
# classification happens during review, not during detection.
#
# SILENT ABANDONMENT is not a signal type — it is a detectable
# graph pattern: a node that other nodes reference but that has no
# outgoing supersedes edge and no graveyard entry. It indicates a
# missing graveyard record. Detection is an analysis operation on
# the graph, not a field on an edge. The fix is to add the missing
# graveyard entry or supersedes edge.
# See: Crossplane composition immutability (finding-006),
#      Rust PinBox (finding-008), Go check/handle (finding-009).

# depends_on (v0.1 COMPATIBILITY)
#
# The v0.1 schema used depends_on as a flat list of node ids:
#   depends_on:
#     - node-a
#     - node-b
#
# This is equivalent to:
#   edges:
#     - target: node-a
#       type: derives
#     - target: node-b
#       type: derives
#
# Existing nodes using depends_on remain valid. New nodes should
# prefer edges. Tooling should treat depends_on as shorthand for
# edges with type: derives.

# consumers is DERIVED, not declared.
# The graph computes it from edges relationships.
# Do not write consumers by hand.

# ─────────────────────────────────────────────
# PROVENANCE FIELDS
# ─────────────────────────────────────────────

provenance:
  created_by:
    type: string
    values: "human | agent:[agent-name]@[version]"
  session:
    type: string
    description: "Session identifier. Links node to conversation or work unit."
  created_at:
    type: ISO date string
  derived_from:
    type: list
    description: >
      For agent-created nodes: input node ids WITH their hash at
      the time of derivation. Format: "node-id@hash:abc123"
      This is the provenance chain. Required for any agent-produced node.
    required: "only for agent-produced nodes"
  reviewed_by:
    type: string or null
    description: "Human reviewer id, or null if not yet reviewed."

# ─────────────────────────────────────────────
# TYPE-SPECIFIC FIELDS
# ─────────────────────────────────────────────

# For type: graveyard
graveyard:
  approach:
    type: string
    description: "What was tried."
  context:
    type: string
    description: "What was known at the time. Why it seemed reasonable."
  finding:
    type: string
    description: "What was actually learned."
  ruling:
    type: string
    description: "What this closes off and why."
  reopener:
    type: string
    description: "What would make this worth revisiting. Be specific."

# For type: brief
brief:
  hypothesis:
    type: string
    description: "What question this probe is testing."
  excluded_scope:
    type: string
    description: "What this probe deliberately does not need to solve."
  success_signal:
    type: string
    description: "What would confirm or disconfirm the hypothesis."
  timebox:
    type: string
    description: "Hard stop. Findings get harvested regardless of completeness."
  predicted_confidence:
    type: float (0.0 - 1.0)
    required: false
    description: >
      Experimenter's confidence in the hypothesis BEFORE the probe runs.
      Recorded at brief creation time, not revised afterward.
      The before-measurement that makes the after-measurement meaningful.
      If the finding surprises — outcome deviates significantly from
      predicted_confidence — that surprise magnitude is the primary
      learning signal. Do not update this field after the probe runs.
      Its value is in being wrong.
      Added: session-013. See question-brief-as-prediction-record.

# For type: finding
finding:
  probe:
    type: node id (brief)
    description: "The brief that generated this finding."
  result:
    type: enum
    values:
      confirms:     "Hypothesis confirmed. Consider promoting to bedrock."
      disconfirms:  "Hypothesis disconfirmed. Consider graveyarding."
      partial:      "Partial answer. Spawns new questions."
      redirects:    "Found something more important than the original question."
  surprise_magnitude:
    type: enum
    required: false
    values:
      none:     "Outcome matched prediction. Model confirmed."
      low:      "Minor deviation. Model needs small adjustment."
      medium:   "Significant deviation. Model needs revision."
      high:     "Prediction was substantially wrong. Strong update signal."
      inverted: "Outcome was opposite of prediction. Strongest signal."
    description: >
      How much did the outcome deviate from the brief's predicted_confidence?
      Inverted is the most valuable signal — the system was confidently wrong.
      Record honestly. A string of 'none' entries means either the probes
      are too safe or the predictions are too vague to be falsifiable.
      Added: session-013. See question-brief-as-prediction-record.

# For type: correspondence
correspondence:
  spec_node:
    type: node id
  code_node:
    type: string
    format: "path/to/file.ext:SymbolOrLine"
  link_type:
    type: enum
    values:
      implements:  "Code realizes spec element behavior"
      tests:       "Code verifies spec element assertions"
      explores:    "Probe code, not yet spec-anchored"
      extends:     "Code goes beyond spec — spec is incomplete"
      violates:    "Detected contradiction — highest severity"
      obsoletes:   "Code has no living spec node"
    notes: >
      The correspondence link_type overlaps intentionally with the
      general edges type enum. implements and contradicts/violates
      mean the same thing in both contexts. Correspondence is the
      spec-to-code specialization; edges is the general spec-to-spec
      relationship. If the two systems prove redundant under further
      use, unify them.
  confidence:
    type: enum
    values:
      declared:  "Explicitly stated by human or trusted agent"
      inferred:  "Derived from analysis (naming, structure, embedding)"
      stale:     "Either end changed since correspondence established"

# ─────────────────────────────────────────────
# OPTIONAL FIELDS
# ─────────────────────────────────────────────

tags:
  type: list of strings
  description: >
    Informal classification. Do not use as a substitute for type.
    Useful for cross-cutting concerns: security, performance,
    data-model, agent-contract, etc.

notes:
  type: string
  description: >
    Scratchpad. Not part of the node's formal content.
    Does not trigger ripple propagation when changed.
    Does not affect content hash.

# ─────────────────────────────────────────────
# WHAT IS NOT IN THIS SCHEMA (intentionally)
# ─────────────────────────────────────────────

# content_hash:
#   Computed, not declared. Tooling generates from content field.
#   Human does not write this. It is derived.

# consumers:
#   Derived from edges graph traversal. Not declared.

# status (dirty/clean):
#   Runtime state managed by ripple engine. Not stored in node file.
#   Clean state is assumed. Dirty state is an event, not a property.

# temporal_state:
#   NOT a schema field. See confidence notes above.
#   Temporal state is either derived from graph topology, expressed
#   in content, or detectable as a contradicts edge when sources
#   disagree. Adding a separate temporal axis was considered in
#   session-002 and deferred — the evidence showed typed edges
#   handle the cases that surfaced. See finding-004-schema-revision.

# ─────────────────────────────────────────────
# FILE CONVENTIONS
# ─────────────────────────────────────────────

# One node per file.
# Filename matches node id: val-uncertainty-first.yaml
# Nodes live in /nodes/ directory.
# Organized by confidence subdirectory:
#   /nodes/bedrock/
#   /nodes/frontier/
#   /nodes/graveyard/
#   /nodes/placeholder/
#
# Moving a file between directories IS the confidence change.
# Git history of that move IS the promotion/demotion record.
# No separate promotion log required — git provides it.

# ─────────────────────────────────────────────
# SCHEMA STATUS
# ─────────────────────────────────────────────

# This schema is FRONTIER.
# v0.3 has survived twelve project probes (session-002, findings 001-013)
# and two schema revision cycles (findings 004, 014).
#
# Evolution:
#   v0.1: depends_on only. Validated under use, found insufficient.
#   v0.2: typed edges (derives, implements, contradicts, supersedes).
#         Validated across 3 projects.
#   v0.3: signal classification on edges (error, evolution, drift).
#         Silent abandonment documented as graph analysis pattern.
#         Validated across 12 projects with diverse governance models.
#
# Specific things likely to change under further use:
#   - signal type enum (three types — too many or too few?)
#   - correspondence vs edges unification (are they redundant?)
#   - graveyard fields (are these the right questions?)
#   - correspondence code_node format (path:symbol may not be enough)
#   - silent abandonment detection (manual analysis → tooling?)
#
# Tooling may now cautiously target this schema. The core fields
# (id, type, confidence, content, edges with signal) are stabilizing.
